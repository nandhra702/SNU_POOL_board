version: '3.8'

services:
  db:
    image: postgres:15
    container_name: snu_pool_db
    environment:
      POSTGRES_USER: snupool
      POSTGRES_PASSWORD: password
      POSTGRES_DB: snupool_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

  api:
    build: ./backend
    container_name: snu_pool_api
    environment:
      - DATABASE_URL=postgresql://snupool:password@db:5432/snupool_db
    ports:
      - "8000:8000"
    depends_on:
      - db
    restart: unless-stopped

volumes:
  postgres_data:
